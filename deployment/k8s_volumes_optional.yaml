# Optional: PersistentVolumes for server (save model) and per-client data
# Use when dataset is NOT baked into image — each pod mounts its own PVC with client_N data.
# For AWS: use EBS (ReadWriteOnce) per client or EFS (ReadWriteMany) shared.
---
# Example: server saves global model to a volume (if you add save logic in server)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fedpinn-server-model
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # storageClassName: gp2   # AWS EBS; set in EKS
---
