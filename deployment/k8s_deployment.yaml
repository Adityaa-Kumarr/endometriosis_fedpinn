---
# Streamlit dashboard (main UI)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fedpinn-dashboard
  labels:
    app: fedpinn-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fedpinn-dashboard
  template:
    metadata:
      labels:
        app: fedpinn-dashboard
    spec:
      containers:
      - name: dashboard
        image: endo-fedpinn:latest
        imagePullPolicy: IfNotPresent
        command: ["streamlit", "run", "app.py", "--server.port=8501", "--server.address=0.0.0.0"]
        ports:
        - containerPort: 8501
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
spec:
  selector:
    app: fedpinn-dashboard
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
