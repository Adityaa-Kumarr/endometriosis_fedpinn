# Federated Digital Twin for Endometriosis — Kubernetes deployment
# One server, one pod per FL client (each client = one dataset), one dashboard.
# For AWS EC2: use with kubeadm/K3s or push image to ECR and use EKS.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fedpinn-server
  labels:
    app: fedpinn-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fedpinn-server
  template:
    metadata:
      labels:
        app: fedpinn-server
    spec:
      containers:
      - name: fedpinn-svr
        image: endo-fedpinn:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "federated/server.py", "5"]
        ports:
        - containerPort: 8080
        env:
        - name: NUM_ROUNDS
          value: "5"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "1000m"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fedpinn-service
spec:
  selector:
    app: fedpinn-server
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Client 1 — one pod, dataset = client_1 (in image at /app/dataset/clients/client_1)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fedpinn-client-1
  labels:
    app: fedpinn-client
    client-id: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fedpinn-client
      client-id: "1"
  template:
    metadata:
      labels:
        app: fedpinn-client
        client-id: "1"
    spec:
      containers:
      - name: fedpinn-cli
        image: endo-fedpinn:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "federated/client.py", "1"]
        env:
        - name: FLOWER_SERVER_URL
          value: "fedpinn-service:8080"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
---
